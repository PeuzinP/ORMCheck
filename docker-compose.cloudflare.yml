services:
  omrcheck-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omrcheck-web
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DATA_DIR: /data
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      HOST: 0.0.0.0
      PORT: 8000
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./docker-data:/data
      - ./templates_omr:/app/templates_omr:ro
      - ./assets:/app/assets:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: omrcheck-cloudflared
    depends_on:
      - omrcheck-web
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
