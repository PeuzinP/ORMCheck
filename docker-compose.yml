services:
  omrcheck-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omrcheck-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8000
      MAX_UPLOAD_FILES: 300
      MAX_FILE_SIZE_MB: 15
      MAX_TOTAL_UPLOAD_SIZE_MB: 512
    volumes:
      - ./docker-data:/data
      - ./templates_omr:/app/templates_omr
      - ./assets:/app/assets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
